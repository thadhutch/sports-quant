ou:
  model_version: v2
  models_to_train: 50
  top_models: 3
  accuracy_threshold: 0.5
  model_weights:
  - 0.4
  - 0.35
  - 0.25
  starting_capital: 100.0
  hyperparameters:
    objective: multi:softprob
    num_class: 3
    eval_metric: mlogloss
  backtest:
    min_training_seasons: 2
    test_size: 0.8
  train:
    test_size: 0.2
march_madness:
  model_version: v2
  models_to_train: 50
  top_models: 3
  backtest_years:
  - 2019
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025
  feature_mode: difference
  hyperparameters:
    objective: binary
    metric: binary_logloss
    num_leaves: 62
    max_depth: 10
    learning_rate: 0.29941968781040595
    n_estimators: 963
    min_child_samples: 79
    reg_alpha: 1.0529176386970869
    reg_lambda: 4.418726931211652
    subsample: 0.6588625026407098
    colsample_bytree: 0.5115784330157085
    min_split_gain: 0.204541747379676
  backtest:
    min_training_years: 3
  train:
    test_size: 0.2
    symmetrize: true
    early_stopping_rounds: 50
  tuning:
    n_trials: 200
    cv_folds:
    - train_end: 2013
      val_year: 2014
    - train_end: 2015
      val_year: 2016
    - train_end: 2017
      val_year: 2018
    - train_end: 2018
      val_year: 2019
    - train_end: 2021
      val_year: 2022
    - train_end: 2022
      val_year: 2023
    - train_end: 2023
      val_year: 2024
  calibration:
    enabled: true
    method: isotonic
    clip_min: 0.025
    clip_max: 0.975
